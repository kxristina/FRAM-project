<!DOCTYPE html>
<html>

<head>
    <title>FRAM</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Frank+Ruhl+Libre:wght@300&display=swap" rel="stylesheet">

</head>

<body>
    <header>
        <nav class="nav-bar">
            
            <button class="menu-btn">
                ☰
            </button>

            <h1 class="logo">FRAM</h1>

            <button class="cart-btn">
                0
            </button>

        </nav>

    </header>

    <main>

         <!-- FRAM -->

        <section class="intro">
            
            <img src="images/header.png" alt="Mountain landscape" class="intro-image">

            <div class="overlay-text">
                
                <h2 class="intro-title">FRAM</h2>

                <div class="divider"></div>

                <p class="intro-text">Home delivery from<br>your local farms</p>

            </div>

        </section>

         <!-- SELECTION -->

        <section class="selection-container">

            <!-- BROWSE SELECTION -->

            <div class="card">

                <h3>Shop our seasonal<br>selection</h3>

                <p class="subtitle">Updated every week</p>

                <img src="images/shop selection.png" alt="Vegetables">

                <p class="description">New produce is added continuously as time goes by and the seasons change.</p>

                <button>Browse our selection</button>

            </div>

            <!-- CHAT -->

            <div class="card">

                <h3>Ask us about<br>anything</h3>

                <p class="subtitle">All your questions answered</p>

                <img src="images/chat.png" alt="Farmer on his field">

                <p class="description">New produce is added continuously as time goes by and the seasons change.</p>

                <button>Go to chat</button>

                

            </div>

        </section>

         <!-- HOW IT WORKS -->

        <section>

        </section>

        <section>

        </section>

    <!-- NEWSLETTER -->

    <footer>

    </footer>

</html>
